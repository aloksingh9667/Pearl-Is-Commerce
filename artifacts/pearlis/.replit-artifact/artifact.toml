kind = "web"
previewPath = "/"
title = "Pearlis — Luxury Jewelry"
version = "1.0.0"
id = "artifacts/pearlis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19638

[services.development]
run = "pnpm --filter @workspace/pearlis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pearlis", "run", "build" ]
publicDir = "artifacts/pearlis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19638"
BASE_PATH = "/"
